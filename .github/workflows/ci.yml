name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Verify repo layout
        run: python scripts/verify_repo_layout.py

      - name: Run pyright
        run: python -m pyright

      - name: Run swift-format lint
        run: swift format lint --recursive ClimateCloset ClimateClosetTests ClimateClosetIntegrationTests --strict

      - name: Run tests
        run: xcodebuild test -project ClimateCloset.xcodeproj -scheme ClimateCloset -destination 'platform=iOS Simulator,name=iPhone 16' CODE_SIGNING_ALLOWED=NO
